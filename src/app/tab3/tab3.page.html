<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Meus Favoritos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Meus Favoritos</ion-title>
    </ion-toolbar>
  </ion-header>

  <ng-container *ngIf="favorites$ | async as favorites">
    <div *ngIf="favorites.length === 0" class="ion-text-center ion-padding">
      <ion-icon name="heart-outline" size="large" color="medium"></ion-icon>
      <p>Voce ainda nao tem favoritos.</p>
      <p>Va em "Buscar" e adicione um drink!</p>
    </div>

    <ion-list *ngIf="favorites.length > 0">
      <ion-item-sliding *ngFor="let fav of favorites; trackBy: trackById">
        <ion-item>
          <ion-thumbnail slot="start">
            <img [src]="fav.image" [alt]="fav.name" />
          </ion-thumbnail>
          <ion-label>
            <h2>{{ fav.name }}</h2>
            <p>{{ fav.category }}</p>
            <p>
              <ion-icon name="star" color="warning" *ngFor="let s of [].constructor(fav.rating)"></ion-icon>
            </p>
            <p *ngIf="fav.notes"><em>{{ fav.notes }}</em></p>
          </ion-label>
        </ion-item>
        <ion-item-options side="end">
          <ion-item-option color="primary" (click)="editFavorite(fav)">
            <ion-icon slot="icon-only" name="create"></ion-icon>
          </ion-item-option>
          <ion-item-option color="danger" (click)="removeFavorite(fav)">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>
  </ng-container>
</ion-content>
